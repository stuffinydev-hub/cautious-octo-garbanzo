name: Build Hakogram iOS

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Archive
    runs-on: macos-14
    permissions:
      contents: read
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Validate Required Secrets
      env:
        TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        set -euo pipefail
        [ -n "${TELEGRAM_API_ID}" ] || { echo "Missing secret: TELEGRAM_API_ID"; exit 1; }
        [ -n "${TELEGRAM_API_HASH}" ] || { echo "Missing secret: TELEGRAM_API_HASH"; exit 1; }
        [ -n "${APPLE_TEAM_ID}" ] || { echo "Missing secret: APPLE_TEAM_ID"; exit 1; }
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Install Dependencies
      run: |
        set -euo pipefail
        brew install bazelisk
        brew install python@3.11
        pip3 install --upgrade pip
    
    - name: Cache Bazel
      uses: actions/cache@v4
      with:
        path: |
          ~/telegram-bazel-cache
          ~/.cache/bazel
        key: ${{ runner.os }}-bazel-${{ hashFiles('**/*.bazel', '**/*.bzl') }}
        restore-keys: |
          ${{ runner.os }}-bazel-
    
    - name: Setup Build Configuration
      run: |
        set -euo pipefail
        cat > build-system/build-configuration.json << EOF
        {
          "bundle_id": "com.hakogram.ios",
          "api_id": "${{ secrets.TELEGRAM_API_ID }}",
          "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
          "team_id": "${{ secrets.APPLE_TEAM_ID }}",
          "app_center_id": "0",
          "is_internal_build": "false",
          "is_appstore_build": "true",
          "appstore_id": "0",
          "app_specific_url_scheme": "hakogram",
          "premium_iap_product_id": "",
          "enable_siri": false,
          "enable_icloud": false
        }
        EOF
    
    - name: Generate Xcode Project
      run: |
        set -euo pipefail
        python3 build-system/Make/Make.py \
          --cacheDir="$HOME/telegram-bazel-cache" \
          generateProject \
          --configurationPath=build-system/build-configuration.json \
          --disableProvisioningProfiles
    
    - name: Build IPA
      run: |
        set -euo pipefail
        python3 build-system/Make/Make.py \
          --cacheDir="$HOME/telegram-bazel-cache" \
          build \
          --configurationPath=build-system/build-configuration.json \
          --buildNumber=${{ github.run_number }} \
          --configuration=release_arm64

    - name: Verify IPA output exists
      run: |
        set -euo pipefail
        shopt -s nullglob
        ipas=( *.ipa )
        if [ ${#ipas[@]} -eq 0 ]; then
          echo "Build finished but no .ipa file was generated"
          exit 1
        fi
        printf 'Found IPA files:\n%s\n' "${ipas[@]}"
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: hakogram-build-${{ github.run_number }}
        path: |
          build/
          *.ipa
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
