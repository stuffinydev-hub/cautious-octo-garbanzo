name: Build Hakogram iOS

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Archive
    runs-on: macos-14
    permissions:
      contents: read
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Validate Required Secrets
      env:
        TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      run: |
        set -euo pipefail
        echo "Checking secrets..."
        if [ -z "${TELEGRAM_API_ID}" ]; then
          echo "⚠️ TELEGRAM_API_ID not set - using default value"
          echo "TELEGRAM_API_ID=0" >> $GITHUB_ENV
        else
          echo "TELEGRAM_API_ID=${TELEGRAM_API_ID}" >> $GITHUB_ENV
        fi
        if [ -z "${TELEGRAM_API_HASH}" ]; then
          echo "⚠️ TELEGRAM_API_HASH not set - using default value"
          echo "TELEGRAM_API_HASH=0" >> $GITHUB_ENV
        else
          echo "TELEGRAM_API_HASH=${TELEGRAM_API_HASH}" >> $GITHUB_ENV
        fi
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Install Dependencies
      run: |
        set -euo pipefail
        brew install bazelisk
        brew install python@3.11
        pip3 install --upgrade pip --break-system-packages || true
    
    - name: Cache Bazel
      uses: actions/cache@v4
      with:
        path: |
          ~/telegram-bazel-cache
          ~/.cache/bazel
        key: ${{ runner.os }}-bazel-${{ hashFiles('**/*.bazel', '**/*.bzl') }}
        restore-keys: |
          ${{ runner.os }}-bazel-
    
    - name: Setup Build Configuration
      run: |
        set -euo pipefail
        TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
        if [ -z "${TEAM_ID}" ]; then
          echo "⚠️ APPLE_TEAM_ID not set - using placeholder for local build"
          TEAM_ID="NOTAREALTEAM"
        fi
        cat > build-system/build-configuration.json << EOF
        {
          "bundle_id": "com.hakogram.ios",
          "api_id": "${TELEGRAM_API_ID}",
          "api_hash": "${TELEGRAM_API_HASH}",
          "team_id": "${TEAM_ID}",
          "app_center_id": "0",
          "is_internal_build": "false",
          "is_appstore_build": "false",
          "appstore_id": "0",
          "app_specific_url_scheme": "hakogram",
          "premium_iap_product_id": "",
          "enable_siri": false,
          "enable_icloud": false
        }
        EOF
        echo "Build configuration created:"
        cat build-system/build-configuration.json
    
    - name: Setup Bazel
      run: |
        set -euo pipefail
        echo "Setting up Bazel via bazelisk..."
        export USE_BAZEL_VERSION=7.4.1
        bazelisk version
        echo "Bazel setup complete"
    
    - name: Generate Xcode Project
      run: |
        set -euo pipefail
        export USE_BAZEL_VERSION=7.4.1
        python3 build-system/Make/Make.py \
          --bazelUserPath="$(which bazelisk)" \
          --cacheDir="$HOME/telegram-bazel-cache" \
          generateProject \
          --configurationPath=build-system/build-configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles
    
    - name: Build IPA
      run: |
        set -euo pipefail
        export USE_BAZEL_VERSION=7.4.1
        python3 build-system/Make/Make.py \
          --bazelUserPath="$(which bazelisk)" \
          --cacheDir="$HOME/telegram-bazel-cache" \
          build \
          --configurationPath=build-system/build-configuration.json \
          --buildNumber=${{ github.run_number }} \
          --configuration=release_arm64

    - name: Verify IPA output exists
      run: |
        set -euo pipefail
        shopt -s nullglob
        ipas=( *.ipa )
        if [ ${#ipas[@]} -eq 0 ]; then
          echo "Build finished but no .ipa file was generated"
          exit 1
        fi
        printf 'Found IPA files:\n%s\n' "${ipas[@]}"
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: hakogram-build-${{ github.run_number }}
        path: |
          build/
          *.ipa
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
